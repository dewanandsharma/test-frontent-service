[build]
  publish = "."
  command = "echo 'Build complete'"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# -------------------------
# SEO & Security Headers
# -------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # FIXED CSP: Added Google Ads, Fonts, and GTM support
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://pagead2.googlesyndication.com https://adservice.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: https://pagead2.googlesyndication.com; font-src 'self' data: https://fonts.gstatic.com; frame-src https://googleads.g.doubleclick.net https://www.google.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# -------------------------
# Domain Canonicalization (Force Non-WWW & HTTPS)
# -------------------------
[[redirects]]
  from = "https://www.ankushinfotech.com/*"
  to = "https://ankushinfotech.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://ankushinfotech.com/*"
  to = "https://ankushinfotech.com/:splat"
  status = 301
  force = true

# -------------------------
# Clean URL Rewrites for New SEO Pages
# -------------------------
[[redirects]]
  from = "/seo-services"
  to = "/hire-freelance-seo-services.html"
  status = 200

[[redirects]]
  from = "/software-development"
  to = "/hire-freelance-software-development-in-mumbai.html"
  status = 200

[[redirects]]
  from = "/ui-ux-design-web-development"
  to = "/hire-ui-ux-web-design-website-developer-in-maharastra"
  status = 200

# Fix index duplicates
[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# -------------------------
# 404 Error Handling
# -------------------------
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404