[build]
  publish = "."

# -------------------------
# Clean URL Rules
# -------------------------

# About
[[redirects]]
  from = "/pages/about"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/pages/about.html"
  to = "/pages/about"
  status = 301

