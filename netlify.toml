[build]
  publish = "."

[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# -------------------------
# Clean URL Rules (Internal Mapping)
# -------------------------
# Netlify's 'pretty_urls = true' handles the .html stripping automatically.
# However, for manual control over specific paths, keep these:

# Services
[[redirects]]
  from = "/pages/services"
  to = "/pages/services.html"
  status = 200

# Portfolio
[[redirects]]
  from = "/pages/portfolio"
  to = "/pages/portfolio.html"
  status = 200

# Blog
[[redirects]]
  from = "/blog/blog"
  to = "/blog/blog.html"
  status = 200

# -------------------------
# Global Domain Rules (SEO Priority)
# -------------------------

# Force non-www to Apex Domain (Essential for SEO Link Equity)
[[redirects]]
  from = "https://www.ankushinfotech.com/*"
  to = "https://ankushinfotech.com/:splat"
  status = 301
  force = true

# Handle 404s (Custom Error Page)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404